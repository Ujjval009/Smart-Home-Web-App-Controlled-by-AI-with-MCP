<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered Smart Home Control Dashboard — manage your devices in real-time using MCP and FastAPI">
    <title>🏠 Smart Home — AI Control Dashboard</title>
    
    <!-- Google Fonts: Inter for clean modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Our styles -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- HEADER -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <header class="app-header" id="app-header">
        <div class="header-content">
            <div class="header-left">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </div>
                <div>
                    <h1>Smart Home</h1>
                    <p class="header-subtitle">AI-Powered Control Dashboard</p>
                </div>
            </div>
            <div class="header-right">
                <div class="connection-status" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Connecting...</span>
                </div>
                <button class="btn-icon" id="btn-theme-toggle" title="Toggle theme" aria-label="Toggle theme">
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- STATS BAR -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <section class="stats-bar" id="stats-bar">
        <div class="stat-card">
            <div class="stat-icon stat-icon-total">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            </div>
            <div>
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">Total Devices</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon stat-icon-on">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
            </div>
            <div>
                <span class="stat-value" id="stat-on">0</span>
                <span class="stat-label">Active</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon stat-icon-off">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
            </div>
            <div>
                <span class="stat-value" id="stat-off">0</span>
                <span class="stat-label">Inactive</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon stat-icon-rooms">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            </div>
            <div>
                <span class="stat-value" id="stat-rooms">0</span>
                <span class="stat-label">Rooms</span>
            </div>
        </div>
    </section>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- ROOM FILTER -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <section class="filter-bar" id="filter-bar">
        <button class="filter-chip active" data-room="all" id="filter-all">All Rooms</button>
    </section>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- MAIN CONTENT: DEVICE GRID -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <main class="main-content" id="main-content">
        <div class="device-grid" id="device-grid">
            <!-- Device cards will be injected here by JavaScript -->
        </div>

        <!-- Loading State -->
        <div class="loading-state" id="loading-state">
            <div class="spinner"></div>
            <p>Loading devices...</p>
        </div>

        <!-- Empty State -->
        <div class="empty-state hidden" id="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <h3>No devices found</h3>
            <p>Add devices via the API or AI assistant</p>
        </div>
    </main>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- ACTION LOG PANEL (slide-out) -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <aside class="log-panel" id="log-panel">
        <div class="log-header">
            <h2>📜 Activity Log</h2>
            <button class="btn-icon btn-close-log" id="btn-close-log" aria-label="Close log panel">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="log-list" id="log-list">
            <!-- Log entries injected here -->
        </div>
    </aside>

    <!-- Log toggle button (floating) -->
    <button class="fab-log" id="btn-open-log" title="View activity log" aria-label="View activity log">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </button>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- TOAST NOTIFICATIONS -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Our JavaScript -->
    <script src="/static/app.js"></script>
</body>
</html>
